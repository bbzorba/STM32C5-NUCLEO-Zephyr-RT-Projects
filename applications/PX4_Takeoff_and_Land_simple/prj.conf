# Enable printk output over the console UART (USART2 on stm32f4_disco)
CONFIG_STDOUT_CONSOLE=y
CONFIG_PRINTK=y

# Use the Zephyr minimal C library (avoids picolibc type conflicts on SDK 0.17.3)
CONFIG_MINIMAL_LIBC=y

# UART driver with interrupt-driven RX (needed for uart_irq_* API)
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# Accurate breakpoint line mapping when debugging
CONFIG_DEBUG_OPTIMIZATIONS=y

# Increase main thread stack for local frame buffers + EDF task array
CONFIG_MAIN_STACK_SIZE=4096